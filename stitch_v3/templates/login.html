<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Smart Waste Dashboard | Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config={theme:{extend:{colors:{
    "primary":"#050f19","secondary":"#006d37","surface":"#f7fafc","surface-container-low":"#f1f4f6"
  },fontFamily:{"inter":["Inter","sans-serif"]}}}}
</script>
<style>
  .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}
  body{font-family:'Inter',sans-serif;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.5;}}
  .pulse{animation:pulse 2s infinite;}
</style>
</head>
<body class="bg-primary flex items-center justify-center min-h-svh p-4">
  <div class="bg-white rounded-2xl shadow-2xl overflow-hidden max-w-4xl w-full flex flex-col md:flex-row">

    <!-- Brand Cover -->
    <div class="w-full md:w-1/2 bg-slate-900 p-8 md:p-12 text-white flex flex-col justify-between relative overflow-hidden min-h-[200px] md:min-h-0">
      <div class="absolute inset-0 bg-gradient-to-br from-slate-900 via-[#0a1628] to-[#006d37]/30"></div>
      <!-- Animated grid bg -->
      <div class="absolute inset-0 opacity-10" style="background-image:linear-gradient(rgba(255,255,255,0.1) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.1) 1px,transparent 1px);background-size:40px 40px;"></div>
      <div class="relative z-10 space-y-3">
        <div class="flex items-center gap-2 mb-4">
          <div class="w-2 h-2 rounded-full bg-[#006d37] pulse"></div>
          <span class="text-[10px] font-bold tracking-[0.2em] uppercase text-[#61de8a]">System Active</span>
        </div>
        <span class="text-lg font-bold tracking-[0.05em] uppercase text-white border-b-2 border-[#006d37] pb-2 block">STITCH</span>
        <h1 class="text-2xl md:text-3xl font-black tracking-tight mt-4">Smart Waste AI<br/>Operations Core</h1>
        <p class="text-slate-400 text-sm max-w-sm mt-3 leading-relaxed">Secure authorization required to access live telemetry, route dispatch, and fleet configuration.</p>
      </div>
      <div class="relative z-10 mt-6 md:mt-12 bg-black/40 backdrop-blur-sm p-4 rounded-xl border border-white/10">
        <div class="flex items-center gap-3">
          <span class="w-2 h-2 rounded-full bg-[#006d37] pulse"></span>
          <span class="text-xs font-bold tracking-widest text-[#006d37] uppercase">System Status: Active</span>
        </div>
      </div>
    </div>

    <!-- Login Form -->
    <div class="w-full md:w-1/2 p-8 md:p-12 flex flex-col justify-center bg-surface">
      <div class="mb-8 text-center">
        <h2 class="text-2xl font-bold text-primary tracking-tight">Operator Login</h2>
        <p class="text-slate-500 text-sm mt-2">Enter credentials to authenticate.</p>
      </div>
      <form class="space-y-5" action="/dashboard" method="GET">
        <div class="space-y-2">
          <label class="text-xs font-bold uppercase tracking-widest text-slate-500">Operator ID / Email</label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-400 text-[20px]">person</span>
            <input type="email" class="w-full pl-12 pr-4 py-3 bg-surface-container-low border border-slate-200 rounded-lg text-sm font-medium focus:outline-none focus:ring-2 focus:ring-[#006d37] transition-all" placeholder="admin@sentinel.org"/>
          </div>
        </div>
        <div class="space-y-2">
          <label class="text-xs font-bold uppercase tracking-widest text-slate-500 flex justify-between">
            Password
            <a href="#" class="text-[#006d37] hover:underline">Forgot?</a>
          </label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-400 text-[20px]">lock</span>
            <input type="password" class="w-full pl-12 pr-4 py-3 bg-surface-container-low border border-slate-200 rounded-lg text-sm font-medium focus:outline-none focus:ring-2 focus:ring-[#006d37] transition-all" placeholder="••••••••"/>
          </div>
        </div>
        <button type="submit" class="w-full bg-primary text-white py-4 mt-4 rounded-lg font-bold tracking-widest text-sm uppercase flex justify-center items-center gap-2 hover:bg-slate-800 transition-all shadow-xl hover:-translate-y-0.5 active:translate-y-0 active:opacity-90">
          Authenticate Session
          <span class="material-symbols-outlined text-sm">arrow_forward</span>
        </button>
      </form>
      <div class="text-center mt-6">
        <p class="text-xs text-slate-400 uppercase tracking-widest font-bold">Authorized Personnel Only</p>
      </div>
      <div class="mt-6 pt-6 border-t border-slate-100 text-center">
        <a href="/" class="text-xs text-slate-400 hover:text-[#006d37] transition-colors">← Back to Home</a>
      </div>
    </div>
  </div>
</body>
</html>
