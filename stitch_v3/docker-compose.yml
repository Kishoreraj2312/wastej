version: '3.8'

services:
  dashboard:
    build: .
    container_name: smartwaste-dashboard
    ports:
      - "5001:5001"
    volumes:
      - ./backend/data:/app/backend/data
    env_file:
      - .env
    environment:
      - PORT=5001
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5001/api/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped
